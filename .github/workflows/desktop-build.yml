name: Build Desktop Installers

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_script: package:win
            artifact: first-nc-windows-x64
            artifact_path: |
              src-tauri/target/x86_64-pc-windows-msvc/release/bundle
              src-tauri/target/x86_64-pc-windows-msvc/release/artifacts
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            package_script: package:linux:docker
            artifact: first-nc-linux-x64
            artifact_path: |
              src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb
              src-tauri/target/x86_64-unknown-linux-gnu/release/artifacts
          - os: macos-14
            target: aarch64-apple-darwin
            package_script: package:mac
            artifact: first-nc-macos-apple-silicon
            artifact_path: |
              src-tauri/target/aarch64-apple-darwin/release/bundle
              src-tauri/target/aarch64-apple-darwin/release/artifacts

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        if: matrix.package_script != 'package:linux:docker'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        if: matrix.package_script != 'package:linux:docker'
        run: npm ci

      - name: Build bundles
        env:
          RAW_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          RAW_APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          RAW_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          RAW_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        shell: bash
        run: |
          if [ "${{ matrix.package_script }}" = "package:mac" ] && [ -n "$RAW_APPLE_API_KEY" ]; then
            printf '%s' "$RAW_APPLE_API_KEY" > "$RUNNER_TEMP/AuthKey.p8"
            export APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          fi
          if [ "${{ matrix.package_script }}" = "package:mac" ] && [ -n "$RAW_APPLE_CERTIFICATE" ] && [ -n "$RAW_APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$RAW_APPLE_API_ISSUER" ] && [ -n "$RAW_APPLE_API_KEY" ]; then
            export APPLE_CERTIFICATE="$RAW_APPLE_CERTIFICATE"
            export APPLE_CERTIFICATE_PASSWORD="$RAW_APPLE_CERTIFICATE_PASSWORD"
            export APPLE_API_ISSUER="$RAW_APPLE_API_ISSUER"
          fi
          npm run ${{ matrix.package_script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
